<html>
    <head>
        <title>Contador Esteira</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="container" class="centerText">
            <div id="red" class="centerText">
                <h3>Vermelho:</h3>
                <h1 id="redCounter">0</h1>
            </div>
            <div id="green" class="centerText">
                <h3>Verde:</h3>
                <h1 id="greenCounter">0</h1>
            </div>
            <div id="blue" class="centerText">
                <h3>Azul:</h3>
                <h1 id="blueCounter">0</h1>
            </div>
        </div>

        <div id="total-time">
            <div id="time" class="centerText">
                <h3>Tempo:</h3>
                <h1 id="timeCounter">0s</h1>
            </div>

            <div id="buttons" class="centerText">
                <input type="text" id="ipInput" placeholder="Ex: 123.456.7.890">
                <button id="btnConect">Conectar Wi-Fi</button>
                <button id="btnOnOff">Ligar Esteira</button>
            </div>

            <div id="total" class="centerText">
                <h3>Total:</h3>
                <h1 id="totalCounter">0</h1>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
